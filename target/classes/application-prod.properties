spring.application.name=GymTracker
server.port=${PORT:8080}

# Hibernate DDL auto setting
#spring.jpa.hibernate.ddl-auto=update

spring.datasource.url=${DB_URL}

# Supabase credentials (keep secrets out of VCS in production)
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

## Show SQL statements in logs
#spring.jpa.show-sql=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.use_streams_for_binary=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

## MySQL dialect for Hibernate
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.app.jwtSecret=${JWT_SECRET}
spring.app.jwtExpirationMs=999900

spring.mail.host = smtp.gmail.com
spring.mail.port = 587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth = true
spring.mail.properties.mail.smtp.starttls.enable = true

logging.level.org.springframework.security=DEBUG

mail.sender= salamiabdulbasit@gmail.com
mail.session.register = Hello, welcome! thank you for registering and picking us
mail.session.booked = Hello, your session has been successfully booked. We look forward to seeing you!
mail.session.reminder =Just a friendly reminder about your upcoming session. We can't wait to have you!
mail.session.edited =Hello, your session details have been updated. Please review the new schedule.
mail.session.deleted =We regret to inform you that your session has been cancelled. Please contact support for details.
